<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RC7 Digital Yearbook</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500;600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-1: #e1bf69;
      --gold-2: #9a6b1f;
      --bg-dark: #0d0d0f;
      --line: rgba(225, 191, 105, 0.45);
      --text-soft: #f3e6c8;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      background: radial-gradient(circle at top, #1b1b1f, #080809 70%);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    .welcome-card {
      position: relative;
      width: min(95vw, 900px);
      min-height: min(78vh, 560px);
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 60%),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.015) 0,
          rgba(255,255,255,0.015) 2px,
          transparent 2px,
          transparent 18px
        ),
        #111216;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: clamp(2rem, 5vw, 4rem) clamp(1rem, 4vw, 3rem);
      animation: fadeInUp 1.2s ease;
    }

    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 12px;
        background: linear-gradient(90deg, #9a6b1f, #e1bf69, #9a6b1f);
        box-shadow: 0 0 10px rgba(225, 191, 105, 0.35);
        z-index: 1000;
    }

    .card-strip {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      height: 12px;
      background: linear-gradient(90deg, var(--gold-2), var(--gold-1), var(--gold-2));
      box-shadow: 0 0 10px rgba(225,191,105,0.35);
    }

    .top-line,
    .bottom-line {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 1px;
      background: var(--line);
    }

    .top-line { top: 56px; }
    .bottom-line { bottom: 64px; }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--text-soft);
      font-size: clamp(2rem, 4vw, 3.6rem);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 1rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .subtitle-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: min(100%, 520px);
      margin-bottom: 2rem;
    }

    .subtitle-wrap::before,
    .subtitle-wrap::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .subtitle {
      color: #f5f1e6;
      font-size: clamp(0.85rem, 1.6vw, 1.1rem);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;

    }

    .crest {
      font-size: clamp(4rem, 10vw, 7rem);
      filter: drop-shadow(0 4px 10px rgba(225,191,105,0.25));
      animation: float 3s ease-in-out infinite;
    }

    .progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .progress::after {
      content: "";
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--gold-2), var(--gold-1));
      transform-origin: left;
      animation: timerBar 6s linear forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes timerBar {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @media (max-width: 768px) {
      .welcome-card {
        min-height: 85vh;
        padding: 5rem 1.2rem 4rem;
      }

      .top-line { top: 50px; }
      .bottom-line { bottom: 50px; }

      .subtitle-wrap {
        gap: 0.5rem;
      }

      .subtitle {
        white-space: normal;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      body { padding: 0.5rem; }

      .welcome-card {
        width: 100%;
        border-radius: 8px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .crest {
        font-size: 4.5rem;
      }
    }
  </style>
</head>
<body>
  <nav class="top-bar"></nav>
  <section class="welcome-card">
    <div class="card-strip"></div>
    <div class="top-line"></div>

    <h1>Welcome to RC7 Digital Yearbook</h1>

    <div class="subtitle-wrap">
      <p class="subtitle">Regular Course 7 Officers Portal</p>
    </div>

    <!-- Replace with your official crest image later -->
    <div class="crest"><img src="{{url_for('static', filename='image/logo.png')}}"></div>

    <div class="bottom-line"></div>
    <div class="progress"></div>
  </section>

  <script>
    // Auto move to next page after 6 seconds
    setTimeout(() => {
      window.location.href = "{{url_for('login')}}"; // change to your actual next page
    }, 6000);
  </script>
</body>
</html>
