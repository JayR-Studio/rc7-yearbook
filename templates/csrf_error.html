{% extends 'base.html' %}

{% block title %}Security Check Failed{% endblock %}

{% block content %}
<div class="page">
    <div class="top-gold"></div>

    <div class="login-panel">
        <h1 class="panel-title">Security Check Failed</h1>
        <p class="error-message">

        <div class="links">
            <a href="{{ url_for('login') }}">Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}
