{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="page">
    <div class="top-gold"></div>

    <div class="brand-wrap">
        <img class="brand-logo"
             src="{{ url_for('static', filename='image/logo.png') }}"
             alt="RC7 Logo">
    </div>

    <div class="login-panel">
        <h1 class="panel-title">Forgot Password</h1>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field">
                <label class="label">Full Name</label>
                <input class="input" name="full_name" required>
            </div>

            <div class="field">
                <label class="label">AP Number</label>
                <input class="input" name="ap_number" required>
            </div>

            <div class="divider"></div>

            <button class="login-button" type="submit">
                Request Password Reset
            </button>
        </form>

        {% if error_message %}
            <p class="error-message">{{ error_message }}</p>
        {% endif %}

        {% if success_message %}
            <p class="success-message">{{ success_message }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}
