{% extends 'base.html' %}

{% block title %}Create Password{% endblock %}

{% block content %}
<div class="page">
    <div class="top-gold"></div>

    <div class="brand-wrap">
        <img
            class="brand-logo"
            src="{{ url_for('static', filename='image/logo.png') }}"
            alt="RC7 Logo"
        >
    </div>

    <div class="login-panel">
        <h1 class="panel-title">Create Password</h1>

        <form method="POST" action="{{ url_for('create_password', officer_id=officer.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label class="label" for="password">New Password</label>
                <div class="input-row">
                    <input
                        class="input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create your password"
                        required
                    >
                    <button
                        type="button"
                        class="dropdown-icon"
                        onclick="togglePassword('password')"
                        aria-label="Show or hide password"
                    >
                        👁
                    </button>
                </div>
            </div>

            <div class="field">
                <label class="label" for="confirm_password">Confirm Password</label>
                <div class="input-row">
                    <input
                        class="input"
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Re-enter your password"
                        required
                    >
                    <button
                        type="button"
                        class="dropdown-icon"
                        onclick="togglePassword('confirm_password')"
                        aria-label="Show or hide confirm password"
                    >
                        👁
                    </button>
                </div>
            </div>

            <div class="divider"></div>

            <button class="login-button" type="submit">Save Password</button>
        </form>

        {% if error_message %}
            <p class="error-message">{{ error_message }}</p>
        {% endif %}
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        field.type = field.type === "password" ? "text" : "password";
    }
</script>
{% endblock %}
