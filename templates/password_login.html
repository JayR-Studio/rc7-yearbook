{% extends 'base.html' %}

{% block title %}Password Login{% endblock %}

{% block content %}
<div class="page">
    <div class="top-gold"></div>

    <div class="brand-wrap">
        <img
            class="brand-logo"
            src="{{ url_for('static', filename='image/logo.png') }}"
            alt="RC7 Logo"
        >
    </div>

    <div class="login-panel">
        <h1 class="panel-title">Enter Password</h1>

        <form method="POST" action="{{ url_for('password_login', officer_id=officer.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label class="label" for="password">Password</label>
                <div class="input-row">
                    <input
                        class="input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >
                    <button
                        type="button"
                        class="dropdown-icon"
                        onclick="togglePassword()"
                        aria-label="Show or hide password"
                    >
                        👁
                    </button>
                </div>
            </div>
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>

            <div class="divider"></div>

            <button class="login-button" type="submit">Login</button>
        </form>

        {% if error_message %}
            <p class="error-message">{{ error_message }}</p>
        {% endif %}
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById("password");
        passwordField.type = passwordField.type === "password" ? "text" : "password";
    }
</script>
{% endblock %}
