{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="page">
    <div class="top-gold"></div>

    <div class="brand-wrap">
        <img
            class="brand-logo"
            src="{{ url_for('static', filename='image/logo.png') }}"
            alt="RC7 Logo"
        >
    </div>

    <div class="login-panel">
        <h1 class="panel-title">Member Login</h1>

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label class="label" for="full_name">Full Name</label>
                <input
                    class="input"
                    type="text"
                    id="full_name"
                    name="full_name"
                    placeholder="Enter your full name"
                    required
                >
            </div>

            <div class="field">
                <label class="label" for="ap_number">AP Number</label>
                <div class="input-row">
                    <input
                        class="input"
                        type="password"
                        id="ap_number"
                        name="ap_number"
                        placeholder="Enter your AP number"
                        required
                    >
                    <button
                        type="button"
                        class="dropdown-icon"
                        onclick="toggleApNumber()"
                        aria-label="Show or hide AP number"
                    >
                        👁
                    </button>
                </div>
            </div>

            <div class="divider"></div>

            <button class="login-button" type="submit">Continue</button>
        </form>

        {% if error_message %}
            <p class="error-message">{{ error_message }}</p>
        {% endif %}
    </div>
</div>

<script>
    function toggleApNumber() {
        const apInput = document.getElementById("ap_number");
        apInput.type = apInput.type === "password" ? "text" : "password";
    }
</script>
{% endblock %}
